# Profile: object names  -> Getty AAT
profile: objectnames
authority: aat

languages:
  source: nb
  target: en
  query_order_by_depth:        # Norwegian-first for leaves, English-first for roots
    leaf: [nb, en]
    root: [en, nb]
  trusted_exact_match_langs: [nb, nn]   # AAT carries Nasjonalmuseet-contributed nb/nn altLabels
  match_langs: [nb, nn, en] 

facets:
  accept_all: true            # when true, any returned facet is accepted and `accepted` is ignored
  accepted: [materials, formats, work_types, techniques]
  hierarchy_mode: prefer       # prefer | off — `prefer` favours candidates in a
                               # preferred sub-hierarchy when picking the proposal
  preferred_hierarchies: {
     # --- Objects Facet ---
    "300209261": "Costume (hierarchy name)",   # 355 terms
    "300045611": "Containers (hierarchy name)",   # 331 terms
    "300022238": "Tools and Equipment (hierarchy name)",   # 314 terms
    "300179869": "Visual Works (hierarchy name)",   # 255 terms
    "300037335": "Furnishings (hierarchy name)",   # 212 terms
    "300241507": "object groupings",   # 78 terms
    "300185711": "Object Genres (hierarchy name)",
    # --- Activities Facet ---
    "300053003": "<processes and techniques by specific type>"   # 27 terms
  }    # AAT anchor id -> label; refines candidate selection
                               # WITHIN accepted facets (never changes the gate).
                               # Fill from: python tools/profile_hierarchies.py 02_candidates.json --emit-yaml
                               # then confirm ids with: python tools/verify_facets.py <id> ...
  linked_art_property:
    techniques:   {target: production, prop: classified_as}
    work_types:   {target: object,     prop: classified_as}
    materials:    {target: object,     prop: made_of}
    formats:      {target: object,     prop: classified_as}  # a vocabulary Type is a classification; Linked Art `dimension` takes numeric Dimension nodes
    design_motifs: {target: object,    prop: classified_as}

thresholds:
  auto_accept:
    mode: full                 # full | exact_only | off
    min_score: 15
    min_score_gap: 10
    trusted_lang_exact_match: true
  review_if:
    cross_facet_ambiguity: true
    broader_only: true

source_schema:
  id_field: ID
  status_field: Status
  include_status: [Gyldig]
  logical_name_field: logicalName
  label_field: label
  level_pattern: "Level_{n}_{lang}"   # tolerant of more levels / other language codes
  dedupe_by: ID

lookup:
  result_limit: 10          # candidates requested per reconciliation query
  enrich_top_n: 8          # enrich at most this many per term (speed + cache size lever);
                           # raised from 5: reconcile's low-end scores are noisy and exactness
                           # is only knowable after enrichment, so a tight cap can cut the
                           # right concept before it can be recognised
  min_candidate_score: 0   # drop candidates below this score before enriching (0 = keep all)
  max_alternative_queries: 3   # fallback queries from LLM alternatives (0 = off)
  alternatives_trigger_score: 60   # run them unless a primary candidate scores at least this (0 = only when primaries find nothing)

review:
  include_auto_accepted: true   # also write auto-accepted terms into 03b_review.csv

translation:                     # optional step 1b (LLM English for terms missing one)
  provider: anthropic
  model: claude-haiku-4-5       # pin the model; change as needed. (sjur: start with haiku-4-5, retry with sonnet-4-6 if needed)
  context: "Norwegian museum object names/work types, for cataloguing and matching against the Getty AAT"
  batch_size: 15                 # terms per API call (cost control)
  max_tokens: 4000
  temperature: 0
  include_siblings: true         # add same-parent siblings as disambiguation context
  max_siblings: 6
  predict_all: true             # `translate --predict-all` overrides per run: also predict
                                 # facet/hierarchy for terms that already have English
  prompt_version: v4             # bump to invalidate the translation cache
                                 # v3: response schema adds expected_facet (advisory)
                                 # v4: adds expected_hierarchy (advisory, from preferred_hierarchies labels)
  domain_by_root:               # top-level parent term -> domain phrase for the prompt
    Arkitektonisk: "architecture (architecture museum context)"
    Design: "design, arts and crafts"
    Billedkunst: "visual arts, classical and contemporary art"

deepen:                          # optional `deepen` stage (classify -> 03c_deepened.json).
                                 # Re-queries the HARD subset wide + Norwegian-first,
                                 # re-classifies with the same rule engine, and adds an
                                 # advisory LLM recommendation. All defaults shown.
  # --- which review/no-match terms to deepen ---
  select_below_score: 25         # deepen a review term whose best scored below this
  select_if_no_exact: true       # ...or that has no exact candidate at all
  select_if_cross_facet_ambiguity: true
  select_no_match: true          # re-search terms that returned zero candidates
  # --- widened, Norwegian-first lookup ---
  result_limit: 20               # candidates per reconcile query in the deep pass
  enrich_top_n: 20               # enrich more so a low-ranked nb-exact isn't truncated
                                 # before its exactness can be recognised
  max_alternative_queries: 5     # LLM alternative-label fallback queries
  alternatives_trigger_score: 0  # 0 = always run them (cast a wide net)
  include_sibling_candidates: true   # harvest cross-facet siblings (no SPARQL)
  max_sibling_candidates: 6
  # --- advisory LLM recommendation (second opinion; never auto-accepts) ---
  use_llm: true                  # `deepen --no-llm` overrides per run
  model: claude-haiku-4-5       # pin the model
  batch_size: 1
  max_tokens: 1500
  temperature: 0                 # deterministic picks (with the cache)
  prompt_version: v2             # bump to invalidate the recommendation cache
                                 # v2: selection prompt (abstention, ordered evidence,
                                 # nb/nn as correctness signal)
  # context: ""                  # defaults to translation.context when empty
