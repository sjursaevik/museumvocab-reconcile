# Profile: art technique/medium vocabulary -> Getty AAT
# This reproduces the settings the technique pilot converged on.
profile: techniques
authority: aat

languages:
  source: nb
  target: en
  query_order_by_depth:        # Norwegian-first for leaves, English-first for roots
    leaf: [nb, en]
    root: [en, nb]
  trusted_exact_match_langs: [nb, nn]   # AAT carries Nasjonalmuseet-contributed nb/nn altLabels
  # match_langs: [nb, nn, en]  # uncomment to require the MATCHED label be in these langs;
                               # blocks coincidental hits on untracked-language labels ("und")

facets:
  preferred: techniques        # influences tiering/ranking; never hard-filters
  accept_all: false            # when true, any returned facet is accepted and `accepted` is ignored
  accepted: [techniques, work_types, materials, formats, design_motifs]
  hierarchy_mode: prefer       # prefer | off — `prefer` favours candidates in a
                               # preferred sub-hierarchy when picking the proposal
  preferred_hierarchies: {}    # AAT anchor id -> label; refines candidate selection
                               # WITHIN accepted facets (never changes the gate).
                               # Fill from: python tools/profile_hierarchies.py 02_candidates.json --emit-yaml
                               # then confirm ids with: python tools/verify_facets.py <id> ...
  linked_art_property:
    techniques:   {target: production, prop: classified_as}
    work_types:   {target: object,     prop: classified_as}
    materials:    {target: object,     prop: made_of}
    formats:      {target: object,     prop: dimension}
    design_motifs: {target: object,    prop: classified_as}

thresholds:
  auto_accept:
    mode: full                 # full | exact_only | off
    min_score: 25
    min_score_gap: 5
    trusted_lang_exact_match: true
  review_if:
    cross_facet_ambiguity: true
    broader_only: true

source_schema:
  id_field: ID
  status_field: Status
  include_status: [Gyldig]
  logical_name_field: logicalName
  label_field: label
  level_pattern: "Level_{n}_{lang}"   # tolerant of more levels / other language codes
  dedupe_by: ID

lookup:
  result_limit: 5          # candidates requested per reconciliation query
  enrich_top_n: 5          # enrich at most this many per term (speed + cache size lever)
  min_candidate_score: 0   # drop candidates below this score before enriching (0 = keep all)
  max_alternative_queries: 3   # fallback queries from LLM alternatives when primary queries find nothing (0 = off)

review:
  include_auto_accepted: false   # also write auto-accepted terms into 03b_review.csv

translation:                     # optional step 1b (LLM English for terms missing one)
  provider: anthropic
  model: claude-sonnet-4-6       # pin the model; change as needed
  context: "Norwegian museum conservation techniques and mediums, for cataloguing and matching against the Getty AAT"
  batch_size: 15                 # terms per API call (cost control)
  max_tokens: 4000
  temperature: 0
  include_siblings: true         # add same-parent siblings as disambiguation context
  max_siblings: 6
  prompt_version: v3             # bump to invalidate the translation cache
                                 # v3: response schema adds expected_facet (advisory)
  domain_by_root:               # top-level parent term -> domain phrase for the prompt
    Arkitektonisk: "architecture (architecture museum context)"
    Design: "design, arts and crafts"
    Billedkunst: "visual arts"
